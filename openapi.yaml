openapi: 3.1.0
info:
  title: Healthcare API
  version: 1.0.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:3000
paths:
  /v1/health:
    get:
      operationId: getHealth
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/database-seeds:
    post:
      operationId: createDatabaseSeed
      summary: Reset and seed German mock hospital data
      responses:
        "201":
          description: Database reset and seeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseSeedResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/financial/summary:
    get:
      operationId: getFinancialSummary
      summary: Get financial dashboard summary
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummaryResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/financial/revenue-trend:
    get:
      operationId: getRevenueTrend
      summary: Get revenue and cost trend
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueTrendResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/financial/by-department:
    get:
      operationId: listDepartmentFinancials
      summary: List financials by department
      responses:
        "200":
          description: Department financials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentFinancialListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/financial/invoices:
    get:
      operationId: listInvoices
      summary: List invoices
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Invoices page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/ops/alerts:
    get:
      operationId: listOperationalAlerts
      summary: List operational alerts
      responses:
        "200":
          description: Operational alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/ops/staffing:
    get:
      operationId: listStaffing
      summary: List staffing by department
      responses:
        "200":
          description: Staffing by department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffingListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/ops/summary:
    get:
      operationId: getOpsSummary
      summary: Get aggregate hospital operations KPIs
      description: >-
        Aggregate hospital KPIs (bed occupancy, capacity, visits, patients,
        employees, departments, wards, appointments on a given date) computed
        entirely via SQL count/sum/GROUP BY aggregates.
      parameters:
        - name: date
          in: query
          required: false
          description: >-
            Europe/Berlin local calendar date to count appointments for. When
            omitted, appointments across all dates are counted.
          schema:
            $ref: "#/components/schemas/BerlinLocalDate"
      responses:
        "200":
          description: Ops summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsSummaryResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/ops/floors:
    get:
      operationId: listFloors
      summary: List the building/floor navigation tree
      description: >-
        One entry per (building, floor) computed via SQL GROUP BY over
        stations plus bed rollups, ordered by building then level. Powers
        the frontend floor-plan navigation tree.
      responses:
        "200":
          description: Floor navigation tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloorSummaryListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/ops/floors/detail:
    get:
      operationId: getFloorDetail
      summary: Get a single floor's wards, rooms, and beds
      description: >-
        Wards -> rooms -> beds for one (building, level) pair, bounded to a
        single floor (~5-6 wards / ~150 beds), with the active inpatient
        occupant of each OCCUPIED bed included.
      parameters:
        - name: building
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: level
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Floor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloorDetailResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/social-security-numbers:
    post:
      operationId: createSocialSecurityNumber
      summary: Create a social security number record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocialSecurityNumberRequest"
      responses:
        "201":
          description: Social security number created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialSecurityNumberResponse"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listSocialSecurityNumbers
      summary: List social security number records
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Social security numbers page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialSecurityNumberListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/social-security-numbers/{social_security_number_id}:
    get:
      operationId: getSocialSecurityNumber
      summary: Get a social security number record
      parameters:
        - name: social_security_number_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^ssn_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Social security number found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialSecurityNumberResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/departments:
    post:
      operationId: createDepartment
      summary: Create a department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepartmentRequest"
      responses:
        "201":
          description: Department created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentResponse"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listDepartments
      summary: List departments
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Departments page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/departments/{department_id}:
    get:
      operationId: getDepartment
      summary: Get a department
      parameters:
        - name: department_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^dep_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Department found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepartmentResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/stations:
    post:
      operationId: createStation
      summary: Create a station
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStationRequest"
      responses:
        "201":
          description: Station created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listStations
      summary: List stations
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Stations page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/stations/{station_id}:
    get:
      operationId: getStation
      summary: Get a station
      parameters:
        - name: station_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^sta_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Station found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/rooms:
    post:
      operationId: createRoom
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "201":
          description: Room created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listRooms
      summary: List rooms
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Rooms page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/rooms/{room_id}:
    get:
      operationId: getRoom
      summary: Get a room
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^roo_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Room found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/beds:
    post:
      operationId: createBed
      summary: Create a bed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBedRequest"
      responses:
        "201":
          description: Bed created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BedResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listBeds
      summary: List beds
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Beds page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BedListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/beds/{bed_id}:
    get:
      operationId: getBed
      summary: Get a bed
      parameters:
        - name: bed_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^bed_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Bed found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BedResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/patient-visits:
    post:
      operationId: createPatientVisit
      summary: Create a patient visit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientVisitRequest"
      responses:
        "201":
          description: Patient visit created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientVisitResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listPatientVisits
      summary: List patient visits
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Patient visits page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientVisitListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/patient-visits/{patient_visit_id}:
    get:
      operationId: getPatientVisit
      summary: Get a patient visit
      parameters:
        - name: patient_visit_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^pvi_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Patient visit found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientVisitResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/patient-movements/available-beds:
    post:
      operationId: listPatientMovementAvailableBeds
      summary: List available beds for moving an active patient visit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientMovementAvailableBedsRequest"
      responses:
        "200":
          description: Available movement rooms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientMovementAvailableBedsResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/patient-movements:
    post:
      operationId: createPatientMovement
      summary: Reserve a target bed and move an active patient visit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientMovementRequest"
      responses:
        "200":
          description: Patient movement reserved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientMovementResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/patient-movements/completions:
    post:
      operationId: completePatientMovement
      summary: Mark a reserved patient movement bed occupied
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletePatientMovementRequest"
      responses:
        "200":
          description: Patient movement completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientMovementCompletionResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/employees:
    post:
      operationId: createEmployee
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Employee created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listEmployees
      summary: List employees
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Employees page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/employees/{employee_id}:
    get:
      operationId: getEmployee
      summary: Get an employee
      parameters:
        - name: employee_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^emp_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Employee found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/appointment-types:
    post:
      operationId: createAppointmentType
      summary: Create an appointment type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentTypeRequest"
      responses:
        "201":
          description: Appointment type created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentTypeResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listAppointmentTypes
      summary: List appointment types
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
        - name: department_id
          in: query
          required: false
          description: Filter appointment types to a single department.
          schema:
            type: string
            pattern: "^dep_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Appointment types page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentTypeListResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointment-types/{appointment_type_id}:
    get:
      operationId: getAppointmentType
      summary: Get an appointment type
      parameters:
        - name: appointment_type_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^aty_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Appointment type found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentTypeResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/appointment-types/{appointment_type_id}/slots:
    get:
      operationId: listAppointmentTypeSlots
      summary: List available slots for an appointment type
      parameters:
        - name: appointment_type_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^aty_[A-Za-z0-9]{12}$"
        - name: start
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BerlinLocalDateTimeMinute"
        - name: end
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BerlinLocalDateTimeMinute"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Available appointment slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentSlotListResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointments/bookings:
    post:
      operationId: createAppointmentBooking
      summary: Book an appointment after patient validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBookingRequest"
      responses:
        "201":
          description: Appointment booked
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointments/cancellations:
    post:
      operationId: createAppointmentCancellation
      summary: Cancel an appointment after patient validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentCancellationRequest"
      responses:
        "201":
          description: Appointment canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointments/reschedules:
    post:
      operationId: createAppointmentReschedule
      summary: Reschedule an appointment after patient validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRescheduleRequest"
      responses:
        "201":
          description: Appointment rescheduled
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointments/searches:
    post:
      operationId: searchPatientAppointments
      summary: List appointments for a validated patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientAppointmentSearchRequest"
      responses:
        "200":
          description: Patient appointments found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientAppointmentSearchResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointments:
    post:
      operationId: createAppointment
      summary: Create an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Appointment created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listAppointments
      summary: List appointments
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
        - name: date
          in: query
          required: false
          description: >-
            Filter appointments to a single Europe/Berlin local calendar
            date. When omitted, appointments across all dates are returned.
          schema:
            $ref: "#/components/schemas/BerlinLocalDate"
      responses:
        "200":
          description: Appointments page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/appointments/{appointment_id}:
    get:
      operationId: getAppointment
      summary: Get an appointment
      parameters:
        - name: appointment_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^app_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /v1/patients:
    post:
      operationId: createPatient
      summary: Create a patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
    get:
      operationId: listPatients
      summary: List patients
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Patients page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListResponse"
        "422":
          $ref: "#/components/responses/Problem"
  /v1/patients/{patient_id}:
    get:
      operationId: getPatient
      summary: Get a patient
      parameters:
        - name: patient_id
          in: path
          required: true
          schema:
            type: string
            pattern: "^pat_[A-Za-z0-9]{12}$"
      responses:
        "200":
          description: Patient found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientResponse"
        "404":
          $ref: "#/components/responses/Problem"
